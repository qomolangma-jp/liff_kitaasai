<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北浅井町町内会 配布設定</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    .row-flex { display: flex; gap: 10px; }
    .row-flex .half { flex: 1; }
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      box-sizing: border-box;
      font-size: 16px; /* iOS拡大防止 */
    }
    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: #f8f8f8 url('data:image/svg+xml;utf8,<svg fill="gray" height="20" viewBox="0 0 20 20" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7.293 7.293a1 1 0 011.414 0L10 8.586l1.293-1.293a1 1 0 111.414 1.414l-2 2a1 1 0 01-1.414 0l-2-2a1 1 0 010-1.414z"/></svg>') no-repeat right 0.75em center/1.5em 1.5em;
      border: 1px solid #ccc;
      border-radius: 6px;
      color: #333;
      padding-right: 2.5em;
      transition: border 0.2s;
    }
    select:focus {
      border-color: #00b900;
      outline: none;
      background-color: #eaffea;
    }
    button { width: 100%; padding: 15px; background: #00b900; color: white; border: none; border-radius: 30px; margin-top: 25px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { text-align: center; margin-top: 10px; color: #666; font-size: 0.9rem; }
    #status.sending { color: #00b900; font-weight: bold; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    #loading-overlay { position: fixed; top: 0; left: 0; text-align: center; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    #loading-overlay.active { display: flex; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #00b900; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;}
    .loading-text { color: #fff; font-size: 0.85rem; margin-top: 15px; font-weight: normal; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<main>
<div id="loading-overlay">
  <div>
    <div class="spinner"></div>
    <div style="color: white; font-size: 0.85rem; margin-top: 15px; text-align: center;">入力セッティング中</div>
  </div>
</div>
<div class="container">
  <h2>北浅井町町内会 配布設定</h2>
  <div id="form">
    <label>氏名</label>
    <div class="row-flex">
      <div class="half">
        <input type="text" id="name_2nd" name="name_2nd" placeholder="姓">
      </div>
      <div class="half">
        <input type="text" id="name_1st" name="name_1st" placeholder="名">
      </div>
    </div>
    <label>フリガナ</label>
    <div class="row-flex">
      <div class="half">
        <input type="text" id="kana_2nd" name="kana_2nd" placeholder="セイ">
      </div>
      <div class="half">
        <input type="text" id="kana_1st" name="kana_1st" placeholder="メイ">
      </div>
    </div>
    <label>班</label>
    <select id="group"></select>

    <label>住所（番地）</label>
    <input type="text" id="address" name="address" placeholder="">

    <label>受取方法</label>
    <select id="is_digital">
      <option value="1">スマホで受け取る</option>
      <option value="2">紙で受け取る</option>
    </select>
    <button onclick="sendData()">登録する</button>
    <div id="status"></div>
  </div>
</div>
</main>

<footer>
  <p style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 20px;">&copy; 2024 北浅井町町内会 ver1.2</p>
</footer>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
/*
    <pre id="debug" style="background:#f8f8f8;color:#333;font-size:0.85em;padding:10px;margin-top:20px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;"></pre>

*/

  const LIFF_ID = '2008962357-ePaQmDO9'; // あなたのLIFF ID
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw0w3rY63BgD0a0pV4R5f5XmRVi7J8070hjkgIr6zArFyrOBoOXa9XkqJnbMCFF3FUy/exec'; // あなたのGAS ウェブアプリURL

  // ローカル環境かどうかを判定
  function isLocalEnvironment() {
    const hostname = window.location.hostname;
    return hostname === 'localhost' || hostname === '127.0.0.1' || hostname.startsWith('192.168.');
  }

  // 班の選択肢を動的に生成
  function initGroupSelect() {
    const groupSelect = document.getElementById('group');
    for (let i = 1; i <= 15; i++) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${i}班`;
      groupSelect.appendChild(option);
    }
  }

async function init() {
  initGroupSelect();
  
  // ローカル環境の場合はLIFFを初期化しない
  if (isLocalEnvironment()) {
    console.log('ローカル環境: LIFFは無効化されています');
    const status = document.getElementById('status');
    status.innerText = "ローカル環境で動作中（LIFF無効）";
    status.style.color = '#ff9900';
    // ローディングを非表示
    document.getElementById('loading-overlay').classList.remove('active');
    return;
  }
  
  // 本番環境の場合のみLIFFを初期化
  await liff.init({ liffId: LIFF_ID });
  
  if (!liff.isLoggedIn()) {
    liff.login();
  } else {
    // ログイン済みなら既存データを取得しに行く
    await fetchExistingData();
  }
}

    /**
    * 既存データの取得とフォームへの反映
    */
    async function fetchExistingData() {
    const status = document.getElementById('status');
    const loadingOverlay = document.getElementById('loading-overlay');
    const form = document.getElementById('form');
    
    // ローディング表示とフォーム無効化
    loadingOverlay.classList.add('active');
    form.classList.add('disabled');
    
    try {
        const profile = await liff.getProfile();
        // GETリクエストでLINE IDを送信
        const response = await fetch(`${GAS_URL}?line_id=${profile.userId}`);
        const data = await response.json();
        // デバッグ用: 取得データをconsoleと画面に表示
        console.log('取得データ:', data);
        //document.getElementById('debug').innerText = JSON.stringify(data, null, 2);

        if (data) {
        // データがあればフォームにセット
        // 新形式（分割済み）優先、なければ旧形式を分割
        document.getElementById('name_2nd').value = data.name_2nd || (data.name ? (data.name.split(/\s+|　/)[0] || "") : "");
        document.getElementById('name_1st').value = data.name_1st || (data.name ? (data.name.split(/\s+|　/)[1] || "") : "");
        document.getElementById('kana_2nd').value = data.kana_2nd || (data.kana ? (data.kana.split(/\s+|　/)[0] || "") : "");
        document.getElementById('kana_1st').value = data.kana_1st || (data.kana ? (data.kana.split(/\s+|　/)[1] || "") : "");
        document.getElementById('group').value = data.group || "";
        document.getElementById('address').value = data.address || "";
        document.getElementById('is_digital').value = data.is_digital || "デジタル配布";
        status.innerText = "登録済みの情報を読み込みました。";
        }
    } catch (err) {
        console.error("データ取得失敗:", err);
    } finally {
        // ローディング非表示とフォーム有効化
        loadingOverlay.classList.remove('active');
        form.classList.remove('disabled');
    }
    }

  async function sendData() {
    const status = document.getElementById('status');
    const button = event.target;
    const name_2nd = document.getElementById('name_2nd').value.trim();
    const name_1st = document.getElementById('name_1st').value.trim();
    const kana_2nd = document.getElementById('kana_2nd').value.trim();
    const kana_1st = document.getElementById('kana_1st').value.trim();
    if(!name_2nd || !name_1st) return alert("姓と名を入力してください");

    button.disabled = true;
    status.className = 'sending';
    status.innerText = "送信中...";
    
    try {
      // ローカル環境の場合はダミー送信
      if (isLocalEnvironment()) {
        await new Promise(resolve => setTimeout(resolve, 1000)); // 1秒待機
        status.className = '';
        status.innerText = "";
        alert("登録完了！（ローカル環境のため実際の送信は行われません）");
        button.disabled = false;
        return;
      }
      
      // 本番環境の場合のみLIFFを使用
      const profile = await liff.getProfile();
      const data = {
        line_id: profile.userId,
        line_name: profile.displayName,
        name: name_2nd + ' ' + name_1st,
        kana: kana_2nd + ' ' + kana_1st,
        group: document.getElementById('group').value,
        address: document.getElementById('address').value.trim(),
        is_digital: document.getElementById('is_digital').value
      };

      // GASへのデータ送信（fetchを使用）
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });
      
      const result = await response.json();
      if (result.status === 'success') {
        status.className = '';
        status.innerText = "";
        alert("登録完了！");
        liff.closeWindow();
      } else {
        throw new Error(result.message);
      }
    } catch (err) {
      button.disabled = false;
      status.className = '';
      alert("エラーが発生しました: " + err);
      status.innerText = "エラー: " + err;
    }
  }

  init();  

</script>
</body>

</html>
