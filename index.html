<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北浅井町 町内会 デジタル配布設定</title>
  <style>
    body { font-family: sans-serif; padding: 0; margin: 0; background: #f0f0f0;}
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px 15px;}
    label { display: block; margin-top: 30px; font-weight: bold; }
    .row-flex { display: flex; gap: 10px; }
    .row-flex .half { flex: 1; }
    input[type="text"], select, textarea { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; }
    .radio-group, .checkbox-group { margin-top: 5px; display: flex; gap: 15px 0; flex-wrap: wrap; justify-content: space-between;}
    .radio-group input[type="radio"],
    .checkbox-group input[type="checkbox"] { display: none; }
    .radio-group label, .checkbox-group label {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 5px; border: 2px solid #ccc; border-radius: 25px;
      background: #fff; color: #555; font-weight: bold; font-size: 0.75em;
      cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
      user-select: none; -webkit-tap-highlight-color: transparent;
      width: 44%; margin-top: 0;
    }
    .radio-group label:has(input:checked),
    .checkbox-group label:has(input:checked),
    .radio-group label.is-selected,
    .checkbox-group label.is-selected { background: #b94100; border-color: #b94100; color: #fff; }
    .radio-group label:hover, .checkbox-group label:hover { border-color: #b94100; color: #b94100; }
    .radio-group label:has(input:checked):hover,
    .checkbox-group label:has(input:checked):hover,
    .radio-group label.is-selected:hover,
    .checkbox-group label.is-selected:hover { color: #fff; }
    button { width: 100%; padding: 15px; background: #1a7a3c; color: white; border: none; border-radius: 30px; margin-top: 25px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { text-align: center; margin-top: 10px; color: #666; font-size: 0.9em; }
    .required-mark { color: #c0392b; margin-left: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>プロフィール・デジタル配布設定</h2>

    <form id="profileForm">
      <div class="row-flex">
        <div class="half">
          <label>氏<span class="required-mark">※</span></label>
          <input type="text" name="name_2nd" placeholder="例: 山田" required>
        </div>
        <div class="half">
          <label>名<span class="required-mark">※</span></label>
          <input type="text" name="name_1st" placeholder="例: 太郎" required>
        </div>
      </div>

      <div class="row-flex">
        <div class="half">
          <label>シ<span class="required-mark">※</span></label>
          <input type="text" name="kana_2nd" placeholder="例: ヤマダ" required>
        </div>
        <div class="half">
          <label>メイ<span class="required-mark">※</span></label>
          <input type="text" name="kana_1st" placeholder="例: タロウ" required>
        </div>
      </div>

      <label>班<span class="required-mark">※</span></label>
      <select name="group" required>
        <option value="">選択してください</option>
        <script>
          for(let i=1; i<=15; i++) {
            document.write(`<option value="${i}">${i}班</option>`);
          }
        </script>
      </select>

      <label>住所</label>
      <input type="text" name="address" placeholder="例: 北浅井町1234-5">

      <label>デジタル配布希望</label>
      <div class="radio-group">
        <label><input type="radio" name="is_digital" value="1"> スマホで受け取る</label>
        <label><input type="radio" name="is_digital" value="2"> 紙で受け取る</label>
      </div>

      <label>カテゴリ（複数選択可）</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="role" value="役員"> 役員</label>
        <label><input type="checkbox" name="role" value="班長"> 班長</label>
        <label><input type="checkbox" name="role" value="青壮年部"> 青壮年部</label>
        <label><input type="checkbox" name="role" value="婦人部"> 婦人部</label>
        <label><input type="checkbox" name="role" value="ほがらかクラブ"> ほがらかクラブ</label>
      </div>

      <label>その他</label>
      <textarea name="other" placeholder="例: 体育協会、消防団など"></textarea>

      <button type="button" id="submitBtn" onclick="submitData()">登録する</button>
      <div id="status"></div>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ※ ご自身の公開URLに変更してください
    
    const LIFF_ID = '2008962357-ePaQmDO9'; // あなたのLIFF ID
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw0w3rY63BgD0a0pV4R5f5XmRVi7J8070hjkgIr6zArFyrOBoOXa9XkqJnbMCFF3FUy/exec'; // あなたのGAS ウェブアプリURL

    function isLocalEnvironment() {
      return window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    }

    function normalizeChoiceValue(value) {
      return String(value ?? "")
        .replace(/\u3000/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parseCheckboxValues(value) {
      if (Array.isArray(value)) {
        return value
          .map(normalizeChoiceValue)
          .filter(Boolean);
      }

      if (!value) {
        return [];
      }

      return String(value)
        .split(/[\n\r\t,、]/)
        .map(normalizeChoiceValue)
        .filter(Boolean);
    }

    function applyCheckboxValues(name, rawValue) {
      const values = parseCheckboxValues(rawValue);
      const checkboxes = Array.from(document.querySelectorAll(`input[name="${name}"][type="checkbox"]`));
      const checkboxMap = new Map(
        checkboxes.map(cb => [normalizeChoiceValue(cb.value), cb])
      );

      checkboxes.forEach(cb => {
        cb.checked = false;
      });

      const unmatchedValues = [];
      values.forEach(value => {
        const checkbox = checkboxMap.get(value);
        if (checkbox) {
          checkbox.checked = true;
        } else {
          unmatchedValues.push(value);
        }
      });

      console.log(`checkbox [${name}] values:`, values);
      if (unmatchedValues.length > 0) {
        console.warn(`checkbox [${name}] unmatched values:`, unmatchedValues);
      }

      syncSelectableLabels();
    }

    function syncSelectableLabels() {
      document.querySelectorAll('.radio-group label, .checkbox-group label').forEach(label => {
        const input = label.querySelector('input[type="radio"], input[type="checkbox"]');
        if (input) {
          label.classList.toggle('is-selected', input.checked);
        }
      });
    }

    window.onload = async function() {
      const status = document.getElementById('status');
      
      if (isLocalEnvironment()) {
        status.innerText = "ローカル環境で起動中...";
        syncSelectableLabels();
        return;
      }

      document.querySelectorAll('.radio-group input, .checkbox-group input').forEach(input => {
        input.addEventListener('change', syncSelectableLabels);
      });

      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        status.innerText = "データ読み込み中...";
        const profile = await liff.getProfile();
        
        // GASから既存データを取得
        const response = await fetch(`${GAS_URL}?line_id=${profile.userId}`);
        const result = await response.json();

        // 取得したデータをフォームに自動反映
        console.log("GAS取得データ:", result); // ← 開発者ツールで確認
        if (result) {
          Object.keys(result).forEach(key => {
            const elements = document.getElementsByName(key);
            if (elements.length > 0) {
              const el = elements[0];
              if (el.type === 'radio') {
                const radio = document.querySelector(`input[name="${key}"][value="${result[key]}"]`);
                if (radio) radio.checked = true;
              } else if (el.type === 'checkbox') {
                applyCheckboxValues(key, result[key]);
              } else {
                el.value = result[key];
              }
            }
          });
        }
        status.innerText = "";
        syncSelectableLabels();
      } catch (err) {
        status.innerText = "初期化エラー: " + err.message;
      }
    };

    async function submitData() {
      const button = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      button.disabled = true;
      status.innerText = "送信中...";
      
      try {
        let profile = { userId: "dummy_id", displayName: "Dummy User" };
        if (!isLocalEnvironment()) {
          profile = await liff.getProfile();
        }

        // フォーム内のすべての input, select, textarea からデータを自動収集
        const data = {
          line_id: profile.userId,
          line_name: profile.displayName
        };

        const formElements = document.querySelectorAll('input[name], select[name], textarea[name]');
        formElements.forEach(el => {
          const name = el.name;
          if (el.type === 'radio') {
            if (el.checked) data[name] = el.value;
          } else if (el.type === 'checkbox') {
            if (!data[name]) data[name] = []; // 配列として初期化
            if (el.checked) data[name].push(el.value);
          } else {
            data[name] = el.value;
          }
        });

        // チェックボックスの配列をカンマ区切りの文字列に変換 ("役員, 班長" など)
        for (let key in data) {
          if (Array.isArray(data[key])) {
            data[key] = data[key].join(', ');
          }
        }

        if (isLocalEnvironment()) {
          await new Promise(resolve => setTimeout(resolve, 1000));
          console.log("送信データ:", data);
          alert("登録完了！（ローカルダミー送信）");
        } else {
          const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(data)
          });
          const result = await response.json();
          if (result.status === 'success') {
            alert("登録完了！");
            liff.closeWindow();
          } else {
            alert("エラーが発生しました: " + result.message);
          }
        }
      } catch (err) {
        alert("通信エラー: " + err.message);
      } finally {
        button.disabled = false;
        status.innerText = "";
      }
    }
  </script>
</body>
</html>
